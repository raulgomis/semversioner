name: Release

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      new_version: ${{ steps.release-info.outputs.new_version }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: '3.14'
        enable-cache: true
    
    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Prepare Release
      id: release-info
      run: |
        # 1. Consolidate changes
        uv run semversioner release
        new_version=$(uv run semversioner current-version)
        echo "new_version=${new_version}" >> $GITHUB_OUTPUT
        
        # 2. Update version and changelog
        uv run semversioner changelog > CHANGELOG.md
        echo "__version__ = \"$new_version\"" > semversioner/__version__.py
        
    - name: Upload release files
      uses: actions/upload-artifact@v7
      with:
        name: release-files
        path: |
          CHANGELOG.md
          semversioner/__version__.py
          .semversioner/
        retention-days: 1

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@v6
    
    - name: Download release files
      uses: actions/download-artifact@v7
      with:
        name: release-files

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        
    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Lint code
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Build and test
      run: |
        uv run pytest --junitxml=junit/test-results-${{ matrix.python-version }}.xml --cov=semversioner --cov-report=term-missing --cov-report=xml

    - name: Upload coverage results
      uses: actions/upload-artifact@v7
      with:
        name: coverage-results-${{ matrix.python-version }}
        path: coverage.xml
      if: ${{ always() }}

    - name: Upload pytest test results
      uses: actions/upload-artifact@v7
      with:
        name: pytest-results-${{ matrix.python-version }}
        path: junit/test-results-${{ matrix.python-version }}.xml
      if: ${{ always() }}

  release:
    name: Commit, Tag and Build
    needs: [prepare, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Download release files
      uses: actions/download-artifact@v7
      with:
        name: release-files

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        git add .
        git commit -m "chore: release version ${{ needs.prepare.outputs.new_version }} [skip ci]"
        git push origin master
        
    - name: Tag and Push
      run: |
        git tag -a -m "v${{ needs.prepare.outputs.new_version }}" "${{ needs.prepare.outputs.new_version }}"
        git push origin "${{ needs.prepare.outputs.new_version }}"

    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        python-version: '3.14'
        enable-cache: true
    
    - name: Install dependencies
      run: uv sync --all-extras --dev

    - name: Build Artifacts
      run: |
        uv build
        
    - name: Upload Release Dists
      uses: actions/upload-artifact@v7
      with:
        name: release-dists
        path: dist/

  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for Trusted Publishing
    steps: 
    - name: Download Artifacts
      uses: actions/download-artifact@v7
      with:
        name: release-dists
        path: dist/
        
    - name: Publish release distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/

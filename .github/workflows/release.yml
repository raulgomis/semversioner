name: Release

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.release-info.outputs.new_version }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        # Use GITHUB_TOKEN or PAT. GITHUB_TOKEN is sufficient if permissions are set.
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        enable-cache: true
    
    - name: Set up Python
      run: uv python install 3.14
    
    - name: Prepare Release
      id: release-info
      run: |
        uv venv 3.14
        uv pip install semversioner
        
        # 1. Consolidate changes
        uv run semversioner release
        new_version=$(uv run semversioner current-version)
        echo "new_version=${new_version}" >> $GITHUB_OUTPUT
        
        # 2. Update version and changelog
        uv run semversioner changelog > CHANGELOG.md
        echo "__version__ = \"$new_version\"" > semversioner/__version__.py
        
    - name: Run Tests
      run: |
        uv run pytest
        
    - name: Build Artifacts
      run: |
        uv build
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-dists
        path: dist/
        
    - name: Tag and Push
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        git add .
        git commit -m "chore: release version ${{ steps.release-info.outputs.new_version }} [skip ci]"
        git push origin master
        
        git tag -a -m "v${{ steps.release-info.outputs.new_version }}" "${{ steps.release-info.outputs.new_version }}"
        git push origin "${{ steps.release-info.outputs.new_version }}"

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for Trusted Publishing
      contents: write # Required for creating GitHub Release
    steps: 
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-dists
        path: dist/
        
    - name: Publish release distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
        
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.build.outputs.new_version }}
        body_path: CHANGELOG.md
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Test and Deploy (master)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install ${{ matrix.python-version }}
    - name: Install dependencies
      run: uv sync --all-extras --dev
    - name: Lint code
      run: |
        uv run ruff check .
        uv run ruff format --check .
    - name: Build and test
      run: |
        uv run pytest --junitxml=junit/test-results-${{ matrix.python-version }}.xml --cov=semversioner --cov-report=term-missing --cov-report=xml
    - name: Upload coverage results
      uses: actions/upload-artifact@v7
      with:
        name: coverage-results-${{ matrix.python-version }}
        path: coverage.xml
      if: ${{ always() }}
    - name: Upload pytest test results
      uses: actions/upload-artifact@v7
      with:
        name: pytest-results-${{ matrix.python-version }}
        path: junit/test-results-${{ matrix.python-version }}.xml
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
    - name: Set up Python
      run: uv python install 3.10
    - name: Publish
      env:
        UV_PUBLISH_USERNAME: ${{ secrets.PYPI_USERNAME }}
        UV_PUBLISH_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        uv sync

        previous_version=$(uv run semversioner current-version)
        uv run semversioner release
        new_version=$(uv run semversioner current-version)
        uv run semversioner changelog > CHANGELOG.md
        echo "Replace version '$previous_version' to '$new_version' in __version__.py ..."
        echo "__version__ = \"$new_version\"" > semversioner/__version__.py

        uv build
        uv publish
        
        git config --global user.name 'Semversioner Bot'
        git config --global user.email 'semversioner@users.noreply.github.com'
        git add .
        git commit -m "Update files for new version '${new_version}' [skip ci]"
        git push origin master
        
        git tag -a -m "Tagging for release ${new_version}" "${new_version}"
        git push origin ${new_version}

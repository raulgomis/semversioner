name: Build Test and Deploy (master)

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        architecture: x64
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[dev]
    - name: Lint code
      run: |
        ruff check .
        ruff format --check .
    - name: Build and test
      run: |
        pytest --junitxml=junit/test-results-${{ matrix.python-version }}.xml --cov=semversioner --cov-report=term-missing --cov-report=xml
    - name: Upload coverage results
      uses: actions/upload-artifact@v7
      with:
        name: coverage-results-${{ matrix.python-version }}
        path: coverage.xml
      if: ${{ always() }}
    - name: Upload pytest test results
      uses: actions/upload-artifact@v7
      with:
        name: pytest-results-${{ matrix.python-version }}
        path: junit/test-results-${{ matrix.python-version }}.xml
      # Use always() to always run this step to publish test results when there are test failures
      if: ${{ always() }}
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'
    - name: Publish
      env:
        TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
        TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
      run: |
        pip install twine build
        pip install .

        previous_version=$(semversioner current-version)
        semversioner release
        new_version=$(semversioner current-version)
        semversioner changelog > CHANGELOG.md
        echo "Replace version '$previous_version' to '$new_version' in __version__.py ..."
        echo "__version__ = '$new_version'" > semversioner/__version__.py

        python -m build
        twine upload dist/*
        
        git config --global user.name 'Semversioner Bot'
        git config --global user.email 'semversioner@users.noreply.github.com'
        git add .
        git commit -m "Update files for new version '${new_version}' [skip ci]"
        git push origin master
        
        git tag -a -m "Tagging for release ${new_version}" "${new_version}"
        git push origin ${new_version}
